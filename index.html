<head>

<body class="dark">
    <div id="unity-container" class="unity-desktop">
        <canvas id="unity-canvas"></canvas>
    </div>
    <div id="loading-cover" style="display:none;">
        <div id="unity-loading-bar">
            <div id="unity-logo"><img src="https://i.ibb.co/1t9rNL5r/Picsart-25-08-12-15-47-39-355.png"></div>

                <div id="unity-progress-bar-full"></div>
            </div>
            <div class="spinner"></div>
        </div>
    </div>
    <script>
    // bloqueia redirecionamentos para sites externos
window.open = function(url, target, features) {
    console.log("Redirecionamento bloqueado para:", url);
    return null; // Retorna null e impede a abertura da nova aba
};
    </script>
    <script>
      const hideFullScreenButton = "";
      const buildUrl = "Build";
      const loaderUrl = buildUrl + "/Unity.loader.js";
      const config = {
        dataUrl: buildUrl + "/Unity.data",
        frameworkUrl: buildUrl + "/Unity.framework.js",
        codeUrl: buildUrl + "/Unity.wasm",
        streamingAssetsUrl: "StreamingAssets",
        companyName: "Cursora Labs OÜ",
        productName: "Kick Lucky Blocks Online",
        devicePixelRatio: 1.5,
        productVersion: "15",
        webglContextAttributes: {
          preserveDrawingBuffer: true,
          powerPreference: "high-performance",
        },
      };

      const container = document.querySelector("#unity-container");
      const canvas = document.querySelector("#unity-canvas");
      const loadingCover = document.querySelector("#loading-cover");
      const progressBarEmpty = document.querySelector("#unity-progress-bar-empty");
      const progressBarFull = document.querySelector("#unity-progress-bar-full");
      const spinner = document.querySelector('.spinner');

      const canFullscreen = (function() {
        for (const key of [
            'exitFullscreen',
            'webkitExitFullscreen',
            'webkitCancelFullScreen',
            'mozCancelFullScreen',
            'msExitFullscreen',
          ]) {
          if (key in document) {
            return true;
          }
        }
        return false;
        }());

      loadingCover.style.display = "";

      // Explicitly setting the background image using JavaScript
      document.body.style.backgroundImage = "url('https://cdn.jsdelivr.net/gh/papamamia/qarama@main/backgrouod.png')";
      document.body.style.backgroundPosition = "center";
      document.body.style.backgroundRepeat = "no-repeat";
      document.body.style.backgroundSize = "cover";

      var myGameInstance = null;

      const script = document.createElement("script");
      script.src = loaderUrl;

      script.onload = () => {
        createUnityInstance(canvas, config, (progress) => {
          spinner.style.display = "none";
          progressBarEmpty.style.display = "";
          progressBarFull.style.width = `${100 * progress}%`;
        }).then((unityInstance) => {
          myGameInstance = unityInstance;
          loadingCover.style.display = "none";
          // Now that Unity is fully loaded, it's safe to interact with it
          //checkDevice(); // Ensure this function is called here
        }).catch((message) => {
          alert(message);
        });
      };

      document.body.appendChild(script);
    </script>

</script>
